<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDEO_AGENT 多风格视频文案演示</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-shell">
        <section class="hero-block">
            <p class="eyebrow">VIDEO_AGENT WEB DEMO</p>
            <h1>多风格视频文案演示</h1>
            <p class="hero-copy">输入一段内容，系统会同时生成知识型、老板型、故事型三种视频表达结果。</p>
        </section>

        <section class="panel input-panel">
            <form id="generate-form" class="input-form">
                <label class="field-label" for="content_mode">内容类型</label>
                <select id="content_mode" name="content_mode" class="input-select">
                    <option value="finance">finance</option>
                    <option value="product">product</option>
                    <option value="ads">ads</option>
                </select>

                <label class="field-label" for="text">输入内容</label>
                <textarea id="text" name="text" class="input-textarea" rows="8" placeholder="例如：利率不是越低越好，关键要看降息发生时企业盈利和市场预期是否同步修复。"></textarea>

                <button id="generate-button" type="submit" class="generate-button">生成多风格视频文案</button>
                <p id="error-message" class="error-message" hidden>生成失败，请稍后重试</p>
            </form>
        </section>

        <section class="results-header">
            <div>
                <h2>生成结果</h2>
                <p>同一输入下，直接对比不同风格的标题和视频脚本结构。</p>
            </div>
        </section>

        <section id="results" class="results-grid"></section>
    </main>

    <template id="result-card-template">
        <article class="result-card">
            <div class="card-topline"></div>
            <div class="card-body">
                <div class="card-toolbar">
                    <div>
                        <p class="style-tag"></p>
                        <h3 class="card-title"></h3>
                    </div>
                    <button type="button" class="copy-btn">复制文案</button>
                </div>
                <div class="section-block">
                    <p class="section-label">标题</p>
                    <p class="headline-text"></p>
                </div>
                <div class="section-block">
                    <p class="section-label">视频脚本</p>
                    <ol class="scene-list"></ol>
                </div>
            </div>
        </article>
    </template>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
